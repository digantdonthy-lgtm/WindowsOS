<html>
<head>
<title>MaxOS</title>

<style>
body{
    margin:0;
    background:url("background.png");
    background-size:cover;
    font-family:sans-serif;
}

/* TOP BAR */
.bar{
    position:fixed;
    bottom:0;
    width:98%;
    height:50px;
    background:rgba(0,0,0,0.7);
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 15px;
    z-index: 10000;
}

/* ICONS */
.icon{
    position:absolute;
    width:50px;
    border-radius:15px;
    cursor:pointer;
}
.icon:hover{
    transform:scale(1.1);
}
.name{
    position:absolute;
    color:white;
    font-size:12px;
    width:50px;
    text-align:center;
}

/* WINDOWS */
.window{
        display:none;
        position:absolute;
        top:200px;
        left:80px;
        background:white;
        border-radius:10px;
        box-shadow:0 10px 30px rgba(0,0,0,0.5);
        overflow:hidden;
}

    /* TITLEBAR */
    .titlebar{
        background:lightgrey;
        height:30px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:0 10px;
    }
    .close{ cursor:pointer; }
    .close:hover{ color:red; }

.controls{
    display: flex;
    gap: 8px;
    cursor: pointer;
}

/* NOTES */
.notes textarea{
    width:100%;
    height:250px;
    border:none;
    outline:none;
    padding:10px;
}

/* CALCULATOR */
.calculator{
    width:260px;
    padding:10px;
    display:none;
}
.calc-body{
    padding: 10px;
}
.calc-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}
.display{
    grid-column:span 4;
    height:60px;
    font-size:20px;
    text-align:right;
    width: 100%;
    padding: 10px;
    border: none;
    outline: none;
    background: black;
    color: #00ffcc;
    border-radius: 8px;
    margin-bottom: 10px;
}
/* BUTTONS */
.calc-grid button{
    padding: 18px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #2c2c2c;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.calc-grid button:hover{
    background: #444;
}

/* OPERATORS */
.op{
    background: #ff9500;
}

.op:hover{
    background: #ffaa33;
}

/* EQUALS */
.equals{
    background: #00c853;
}

.equals:hover{
    background: #00e676;
}

/* ZERO BUTTON */
.zero{
    grid-column: span 2;
} 

/*BROWSER*/
.browser{
    width:600px;
    height:400px;
}
.browser-bar{
    display: flex;
    padding: 5px;
    background: #eee;
}
.browser-bar input{
    flex: 1;
    padding: 5px;
}
.browser-bar button{
    padding: 5px 10px;
}
iframe{
    width: 100%;
    height: calc(100% - 40px);
    border: none;
}

/* MEMORY GAME*/

</style>

</head>

<body>

<div class="bar">
    <div>🪟 Windows</div>
    <div id="time"></div>
</div>

<!-- ICONS -->
<img src="icon1.png" class="icon" style="top:15px;left:20px;" onclick="openApp('notes')">
<div class="name" style="top:65px;left:20px;">Notes</div>

<img src="icon2.png" class="icon" style="top:90px;left:20px;" onclick="openApp('calculator')">
<div class="name" style="top:140px;left:20px;">Calculator</div>

<img src="icon3.png" class="icon" style="top:165px;left:20px;" onclick="openApp('browser')">
<div class="name" style="top:215px;left:20px;">Browser</div>

<img src="icon4.png" class="icon" style="top:240px;left:20px;" onclick="openApp('paint')">
<div class="name" style="top:290px;left:20px;">Paint</div>

<img src="icon5.png" class="icon" style="top:315px;left:20px;" onclick="openApp('games')">
<div class="name" style="top:365px;left:20px;">Games</div>

<!-- NOTES -->
<div class="window notes" id="notes">
    <div class="titlebar">
        <span>Notes</span>
        <div class="controls">
        <span onclick="maximizeApp('notes')" >🟩</span>
        <span class="close" onclick="closeApp('notes')">❌</span>
        </div>
    </div>
    <textarea></textarea>
</div>

<!-- CALCULATOR -->
<div class="window calculator" id="calculator">
    <div class="titlebar">
        <span>Calculator</span>
        <div class="controls">
        <span onclick="maximizeApp('calculator')" >🟩</span>
        <span class="close" onclick="closeApp('calculator')">❌</span>
        </div>
    </div>

    <div class="calc-body">
        <input type="text" id="display" class="display" disabled>

        <div class="calc-grid">
            <button onclick="clearDisplay()" class="op">C</button>
            <button onclick="add('/') " class="op">÷</button>
            <button onclick="add('*')" class="op">×</button>
            <button onclick="add('-')" class="op">−</button>

            <button onclick="add('7')">7</button>
            <button onclick="add('8')">8</button>
            <button onclick="add('9')">9</button>
            <button onclick="add('+')" class="op">+</button>

            <button onclick="add('4')">4</button>
            <button onclick="add('5')">5</button>
            <button onclick="add('6')">6</button>

            <button onclick="add('1')">1</button>
            <button onclick="add('2')">2</button>
            <button onclick="add('3')">3</button>

            <button onclick="add('0')" class="zero">0</button>
            <button onclick="add('.')">.</button>
            <button onclick="calculate()" class="equals">=</button>
        </div>
    </div>
</div>

<!-- BROWSER -->
<div class="window browser" id="browser">
    <div class="titlebar">
        <span>Browser</span>
        <div class="controls">
        <span onclick="maximizeApp('browser')" >🟩</span>
        <span class="close" onclick="closeApp('browser')">❌</span>
        </div>
    </div>

    <div class="browser-bar">
        <input type="text" id="url" placeholder="Enter URL or search...">
        <button onclick="loadPage()">Go</button>
    </div>

    <iframe id="viewer"></iframe>
</div>

<!-- PAINT-->
 <div class="window" id="paint" style="width: 600px;height: 400px;">
    <div class="titlebar">
        <span>Paint</span>
        <div class="controls">
        <span onclick="maximizeApp('paint')" >🟩</span>
        <span class="close" onclick="closeApp('paint')">❌</span>
        </div>
    </div>
    <!--TOOLSBAR-->
    <div style="padding:5px;background: #eee;">
        <input type="color" id="colorPicker">
        <button onclick="clearCanvas()">Clear</button>
    </div>
    <!--CANVAS-->
    <canvas id="canvas" style="margin:10px; width:calc(100% - 20px); height:300px; background:white;"></canvas>
 </div>

 <!--GAME HUB-->
 <div class="window" id="games" style="width:750px;height:500px;">
    <div class="titlebar">
        <span>Game Hub</span>
        <div class="controls">
        <span onclick="maximizeApp('games')" >🟩</span>
        <span class="close" onclick="closeApp('games')">❌</span>
        </div>
    </div>

    <iframe src="gamehub.html" style="width:100%;height:90%;border:none;"></iframe>
</div>
<script>
/* CLOCK */
setInterval(()=>{
    document.getElementById("time").innerText =
    new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
},1000);

/* UNIVERSAL APP SYSTEM */

function closeApp(app){
    document.getElementById(app).style.display = "none";
}

let z = 1;
const MAX_Z = 999;
function openApp(app){
    let win = document.getElementById(app);
    win.style.display = "block";
    win.style.zIndex = z++;
    
    if(app === "paint"){
        setTimeout(() => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }, 50);
    }
}
document.querySelectorAll(".window").forEach(win=>{
    win.addEventListener("mousedown",()=>{
        win.style.zIndex = z++;
        if(z > MAX_Z){
            z = 1;
        }
    });
});

function maximizeApp(id){
    let win = document.getElementById(id);
    let taskbarHeight = 50; // adjust if your bar height changes

    if(!win.classList.contains("max")){
        // Save current position & size
        win.dataset.top = win.style.top;
        win.dataset.left = win.style.left;
        win.dataset.width = win.style.width;
        win.dataset.height = win.style.height;

        // Maximize
        win.style.top = "0px";
        win.style.left = "0px";
        win.style.width = "100%";
        win.style.height = `calc(100% - ${taskbarHeight}px)`;

        win.classList.add("max");
    }
    else{
        // Restore
        win.style.top = win.dataset.top;
        win.style.left = win.dataset.left;
        win.style.width = win.dataset.width;
        win.style.height = win.dataset.height;

        win.classList.remove("max");
    }
}

/* CALCULATOR LOGIC */
function add(val){
    display.value += val;
}
function calculate(){
    display.value = eval(display.value);
}
function clearDisplay(){
    display.value = "";
}
document.addEventListener("keydown", function(event){
    let key = event.key;

    if("0123456789+-*/.".includes(key)){
        add(key);
    }
    else if(key === "Enter"){
        calculate();
    }
    else if(key === "Backspace"){
        display.value = display.value.slice(0,-1);
    }
    else if(key === "Escape"){
        clearDisplay();
    }
});

/*Dragging system*/
let activeWindow = null;
let offsetX = 0, offsetY = 0;

document.querySelectorAll(".titlebar").forEach(bar => {
    bar.onmousedown = function(e){
        activeWindow = bar.parentElement;

        offsetX = e.clientX - activeWindow.offsetLeft;
        offsetY = e.clientY - activeWindow.offsetTop;
    };
});

document.onmousemove = function(e){
    if(activeWindow && !activeWindow.classList.contains("max")){

        let newX = e.clientX - offsetX;
        let newY = e.clientY - offsetY;

        let taskbarHeight = 50;

        let winWidth = activeWindow.offsetWidth;
        let winHeight = activeWindow.offsetHeight;

        let screenWidth = window.innerWidth;
        let screenHeight = window.innerHeight;

        // 🚫 TOP LIMIT
        if(newY < 0) newY = 0;

        // 🚫 BOTTOM LIMIT (taskbar)
        if(newY + winHeight > screenHeight - taskbarHeight){
            newY = screenHeight - taskbarHeight - winHeight;
        }

        // 🚫 LEFT LIMIT
        if(newX < 0) newX = 0;

        // 🚫 RIGHT LIMIT
        if(newX + winWidth > screenWidth){
            newX = screenWidth - winWidth;
        }

        activeWindow.style.left = newX + "px";
        activeWindow.style.top = newY + "px";
    }
};

document.onmouseup = function(){
    activeWindow = null;
};

/*BROWSER*/
function loadPage(){
    let input=document.getElementById("url").value;
    if(input.includes(".")){
        if(!input.startsWith("http")){
            input="https://"+input;
        }
    }
    else{
        input="https://www.google.com/search?q=" + input;
    }
    document.getElementById("viewer").src=input;
}

/* PAINT */
let canvas, ctx;
let drawing = false;

window.addEventListener("load", function(){
    canvas = document.getElementById("canvas");
    ctx = canvas.getContext("2d");

    // 🔥 IMPORTANT: set real canvas resolution
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    canvas.addEventListener("mousedown", () => drawing = true);
    canvas.addEventListener("mouseup", () => drawing = false);
    canvas.addEventListener("mouseleave", () => drawing = false);
    canvas.addEventListener("mousemove", draw);
});

function draw(e){
    if(!drawing) return;

    let rect = canvas.getBoundingClientRect();
    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;

    let color = document.getElementById("colorPicker").value;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fill();
}

function clearCanvas(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}
</script>

</body>
</html>
