<html>
<head>
<title>Mini Game Hub</title>
</head>
<body>
<div id="menu">
    <h1 class="Title">Mini Game Hub</h1>
    <p class="Subtitle">Play! Complete! Have Fun!</p>

    <div class="menu">
        <button onclick="openGame('tictactoe.html')">❌⭕ Tic Tac Toe</button>
        <button onclick="openGame('memory.html')">🧠 Memory Game</button>
        <button onclick="openGame('reaction.html')">⚡ Reaction Timer</button>
        <button onclick="openGame('guessing.html')">🔢 Number Guessing</button>
    </div>
</div>
<iframe id="gameFrame"></iframe>
<style>
body{
    margin: 0;
    font-family: Arial, sans-serif;
    background: url(gamehub.png);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    color: white;
    text-align: center;
}
.Title{
    margin-top:50px;
    font-size:3rem;
    text-shadow: 0 0 10px #00f7ff;
}

.Subtitle{
    margin-bottom:30px;
    color: #ccc;
}
.menu{
    display:flex;
    flex-direction: column;
    align-items: center;
}
button{
  width: 250px;
  padding: 15px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: #1f4068;
  color: white;
  transition: 0.3s;
}
button:hover{
    background: #00adb5;
    transform: scale(1.05);
}
#gameFrame{
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
}
</style>
<script>
function openGame(page){
    document.getElementById("menu").style.display = "none";
    let frame = document.getElementById("gameFrame");
    frame.style.display = "block";
    frame.src = page;
}
window.addEventListener("message", function(e){
    if(e.data === "goBack"){
        let frame = document.getElementById("gameFrame");
        frame.style.display = "none";
        frame.src = "";

        document.getElementById("menu").style.display = "block";
    }
});
</script>
</body>
</html>
